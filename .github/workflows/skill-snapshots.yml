name: skill-snapshots

# The arch-programming skill bundles point-in-time copies of core ARCH docs
# under skills/arch-programming/references/. This check fails if a source doc
# changes without refreshing its bundled snapshot (or vice versa).
#
# NB: runs on EVERY PR to main, deliberately with no `paths:` filter. This job
# is a REQUIRED status check under main's branch protection, and a required
# check that is path-filtered never reports on PRs that don't touch those paths
# — leaving them stuck "Expected — waiting for status" and unmergeable. The
# check itself is a cheap whole-tree invariant (`cmp` each source against its
# bundled snapshot at HEAD); it does not depend on the PR's diff, so running it
# unconditionally is correct and reports a real status on every PR.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: skill-snapshots-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-snapshots:
    name: skill snapshots in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify bundled skill snapshots match their sources
        run: scripts/sync_skill_snapshots.sh check
